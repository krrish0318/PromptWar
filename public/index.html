<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VenueCrowd | Smart Optimizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body>
    <header>
        <div class="logo">VenueCrowd</div>
        <div id="connection-status">🟢 Live</div>
    </header>

    <main class="main-container">
        <nav class="sidebar">
            <section class="panel">
                <h3>🧠 Assistant</h3>
                <input type="text" id="ai-query" placeholder="Ask anything...">
                <button onclick="askAssistant()">🚀</button>
                <div id="ai-response" style="display:none; font-size:0.8rem; margin-top:10px;"></div>
            </section>

            <section class="panel">
                <h3>Live Crowd</h3>
                <div id="crowd-list"></div>
            </section>

            <section class="panel">
                <h3>Smart Routing</h3>
                <select id="start-node"><option value="gate_a">Gate A</option><option value="gate_b">Gate B</option></select>
                <select id="end-node"><option value="seating_zone_1">Seating</option><option value="food_court">Food Court</option></select>
                <button onclick="getSmartRoute()" style="width:100%">Find Route</button>
                <div id="route-panel" style="display:none; font-size:0.8rem; margin-top:10px;">
                    <p id="route-text"></p>
                </div>
            </section>
        </nav>
        <div id="map"></div>
    </main>
    <script src="app.js"></script>
</body>
</html>
